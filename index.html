<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa TERRITORIAL CENIIECT</title>
    
    <!-- Fuentes: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        :root {
            /* Variables Tema Claro */
            --bg-color: #FAFAFA;
            --surface-color: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --accent-color: #0070F3;
            --accent-hover: #0051B3;
            
            /* Burbujas */
            --muni-bubble-bg: var(--accent-color);
            --muni-bubble-color: #FFFFFF;
            --inst-bubble-bg: #FFFFFF;
            --inst-bubble-border: var(--accent-color);
            --inst-bubble-color: var(--accent-color);

            /* UI Elements */
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            
            --transition-speed: 0.3s;
        }

        /* Variables Tema Oscuro */
        body.dark-mode {
            --bg-color: #111111;
            --surface-color: #161616;
            --text-main: #EDEDED;
            --text-muted: #A0A0A0;
            --border-color: #333333;
            --accent-color: #3291FF;
            
            --muni-bubble-bg: var(--accent-color);
            --inst-bubble-bg: #161616;
            --inst-bubble-border: var(--accent-color);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color var(--transition-speed);
        }

        /* --- Header & Theme Toggle --- */
        header {
            background-color: var(--surface-color);
            padding: 0.85rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .header-titles h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.025em; }
        .header-titles .subtitle { color: var(--text-muted); font-size: 0.8rem; }

        .theme-toggle-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .theme-toggle-btn:hover { background-color: var(--bg-color); border-color: var(--text-muted); }
        .theme-toggle-btn svg { width: 15px; height: 15px; }
        body.dark-mode .sun-icon, body:not(.dark-mode) .moon-icon { display: none; }

        /* --- Main Layout --- */
        main { flex: 1; position: relative; overflow: hidden; display: flex; }

        /* --- Map --- */
        #map { flex: 1; width: 100%; height: 100%; z-index: 1; background-color: var(--bg-color); }

        /* --- Custom Markers --- */
        .leaflet-div-icon { background: transparent; border: none; }

        .marker-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Burbuja Municipio */
        .muni-bubble {
            background-color: var(--muni-bubble-bg);
            color: var(--muni-bubble-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 0 0 4px rgba(50, 145, 255, 0.25);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s;
            transform-origin: center;
            cursor: pointer;
            pointer-events: auto;
        }
        .muni-bubble:hover { transform: scale(1.1); }
        .muni-bubble.hidden { 
            opacity: 0; 
            transform: scale(0); 
            pointer-events: none !important;
            display: none !important;
        }

        /* Burbuja Institución */
        .inst-bubble {
            background-color: var(--inst-bubble-bg);
            color: var(--inst-bubble-color);
            border: 2px solid var(--inst-bubble-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.75rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease, opacity 0.3s ease var(--delay, 0s), transform 0.3s ease var(--delay, 0s);
            transform-origin: center;
            opacity: 0; 
            transform: scale(0);
            pointer-events: none !important;
            display: none !important;
        }
        .inst-bubble.visible { 
            opacity: 1; 
            transform: scale(1); 
            pointer-events: auto !important;
            display: flex !important;
        }
        .inst-bubble:hover { transform: scale(1.3) !important; z-index: 1000; background-color: var(--accent-color); color: white; }

        /* --- Sidebar Panel --- */
        #sidebar {
            position: absolute; top: 1rem; right: 1rem; bottom: 1rem; width: 360px;
            background-color: var(--surface-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background-color var(--transition-speed);
            display: flex; flex-direction: column; overflow: hidden;
        }
        #sidebar.open { transform: translateX(0); }

        .sidebar-header { padding: 1.1rem 1.25rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: flex-start; }
        .sidebar-title { font-size: 1.05rem; font-weight: 600; }
        .sidebar-subtitle { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.15rem; }

        .close-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.3rem; border-radius: 6px; }
        .close-btn:hover { background-color: var(--bg-color); color: var(--text-main); }

        .sidebar-content { padding: 1rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1rem; }

        .zone-section .zone-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; padding-left: 0.25rem;}

        .inst-list { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }
        .inst-item {
            font-size: 0.8rem; padding: 0.6rem 0.8rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .inst-item:hover { border-color: var(--accent-color); background-color: var(--surface-color); transform: translateX(-2px); }
        .inst-item.highlight { border-color: var(--accent-color); background-color: rgba(50, 145, 255, 0.12); font-weight: 600; }
        .inst-item.no-coord { opacity: 0.75; cursor: default; }
        
        .tag-pending { font-size: 0.65rem; color: var(--text-muted); background: var(--border-color); padding: 2px 6px; border-radius: 4px; }

        /* Tooltip */
        .leaflet-tooltip.modern-tooltip {
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

        /* Responsive Móvil (Bottom Sheet) */
        @media (max-width: 768px) {
            header { padding: 0.75rem 1rem; }
            .header-titles h1 { font-size: 1rem; }
            .header-titles .subtitle { font-size: 0.75rem; }

            #sidebar {
                top: auto; right: 0; bottom: 0; left: 0;
                width: 100%; height: 52vh;
                border-radius: 20px 20px 0 0;
                border-bottom: none;
                transform: translateY(120%);
            }
            #sidebar.open { transform: translateY(0); }

            .sidebar-header::before {
                content: ''; position: absolute; top: 8px; left: 50%;
                transform: translateX(-50%); width: 36px; height: 4px;
                background-color: var(--border-color); border-radius: 2px;
            }
            .sidebar-header { padding-top: 1.25rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-titles">
            <h1>Mapa TERRITORIAL CENIIECT</h1>
            <div class="subtitle">República de Colombia</div>
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Cambiar tema">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <span id="theme-text">Modo Oscuro</span>
        </button>
    </header>

    <main>
        <div id="map"></div>
        
        <aside id="sidebar">
            <div class="sidebar-header">
                <div>
                    <h2 class="sidebar-title" id="side-title">Municipio</h2>
                    <div class="sidebar-subtitle" id="side-subtitle">0 instituciones</div>
                </div>
                <button class="close-btn" onclick="closeSidebar()" aria-label="Cerrar panel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="sidebar-content" id="side-content">
                <!-- Contenido dinámico -->
            </div>
        </aside>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script>
        /**
         * BASE DE DATOS
         */
        const educacionData = [
            {
                id: "santa-marta",
                name: "Santa Marta",
                coords: [11.2404, -74.1978],
                zoom: 11,
                instituciones: [
                    { id: "sm_ied_mag", name: "I.E.D. Magdalena", zone: "Urbana", coords: [11.24195459455506, -74.1966160597475] },
                    { id: "sm_ied_jmd", name: "IED Juan Miguel D'Osuna", zone: "Urbana", coords: [11.22569016697624, -74.17460354175658] },
                    { id: "sm_ied_on", name: "IED Once de Noviembre", zone: "Urbana", coords: [11.221588946664031, -74.15606096498708] },
                    { id: "sm_ied_jlg", name: "IED José Laborde Gnecco", zone: "Urbana", coords: [11.192958212809025, -74.22407123091298] },
                    { id: "sm_ied_sb", name: "I.E.D. Simón Bolívar", zone: "Urbana", coords: [11.187663181892308, -74.21709583067158] },
                    { id: "sm_ied_rdb", name: "IED Rodrigo de las Bastidas", zone: "Urbana", coords: [11.230679450961079, -74.17589079246063] },
                    { id: "sm_ied_ti", name: "IED Técnico Industrial", zone: "Urbana", coords: [11.243397190062135, -74.20424532110744] },
                    { id: "sm_ied_pc", name: "IED Pedagógico del Caribe", zone: "Urbana", coords: [11.200898358553742, -74.16440580361768] },
                    { id: "sm_ied_nb", name: "IED Nicolás Buenaventura", zone: "Urbana", coords: [11.248885796397412, -74.17089768604747] },
                    { id: "sm_ied_sr", name: "IED Simón Rodríguez", zone: "Urbana", coords: [11.228496434938736, -74.16743289042674] },
                    { id: "sm_ied_ln", name: "IED Liceo del Norte", zone: "Urbana", coords: [11.249778703828827, -74.20185935847962] },
                    { id: "sm_ied_ct", name: "I.E.D. Camilo Torres", zone: "Urbana", coords: [11.193302536512217, -74.21873509042702] },
                    { id: "sm_ied_lrm", name: "Institución Educativa Libardo Ramiro Muñoz", zone: "Urbana", coords: null },
                    { id: "sm_ied_bon", name: "IED Bonda (Sede 4 Inmaculada Concepción)", zone: "Rural", coords: [11.230894009886562, -74.13064140207788] },
                    { id: "sm_ied_rev", name: "Institución Etnoeducativa Distrital Intercultural La Revuelta", zone: "Rural", coords: [11.278347292734285, -73.94121982546527] }
                ]
            },
            {
                id: "aracataca",
                name: "Aracataca",
                coords: [10.590840570268254, -74.18941644620368],
                zoom: 14,
                instituciones: [
                    { id: "ara_ied_evt", name: "IED Elvia Vizcaíno de Todaro", zone: "Urbana", coords: [10.590840570268254, -74.18941644620368] }
                ]
            }
        ];

        /* CONFIGURACIÓN VISTA INICIAL: COLOMBIA COMPLETA */
        const config = {
            mapCenter: [4.5709, -74.2973], // Coordenadas del centro de Colombia
            initZoom: 6,                   // Zoom adecuado para ver todo el país
            minZoomToDistricts: 10         // Umbral ajustado para que no falle Santa Marta
        };

        let map, muniLayerGroup, instLayerGroup, colombiaGeoJsonLayer;

        function init() {
            initMap();
            loadColombiaBoundary();
            plotData();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(config.mapCenter, config.initZoom);
            
            const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' });
            const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' });
            
            lightTiles.addTo(map);
            map.tileLayers = { light: lightTiles, dark: darkTiles };

            L.control.zoom({ position: 'bottomright' }).addTo(map);

            instLayerGroup = L.layerGroup().addTo(map);
            muniLayerGroup = L.layerGroup().addTo(map);

            map.on('zoomend', handleZoomEnd);
        }

        /* DIBUJAR FRONTERA RESALTADA DE COLOMBIA */
        function loadColombiaBoundary() {
            fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/COL.geo.json')
                .then(res => res.json())
                .then(data => {
                    colombiaGeoJsonLayer = L.geoJSON(data, {
                        style: getColombiaStyle()
                    }).addTo(map);
                })
                .catch(err => console.error("Error al cargar frontera de Colombia:", err));
        }

        function getColombiaStyle() {
            const isDark = document.body.classList.contains('dark-mode');
            return {
                color: isDark ? '#3291FF' : '#0070F3', // Color del borde destacado
                weight: 2.5,
                opacity: 0.85,
                fillColor: isDark ? '#3291FF' : '#0070F3',
                fillOpacity: isDark ? 0.08 : 0.05,
                interactive: false
            };
        }

        function plotData() {
            educacionData.forEach(muni => {
                const totalInst = muni.instituciones.length;

                const muniIcon = L.divIcon({
                    className: '',
                    html: `<div class="marker-wrapper"><div class="muni-bubble" id="muni-bubble-${muni.id}" style="width:52px; height:52px;">${totalInst}</div></div>`,
                    iconSize: [52, 52],
                    iconAnchor: [26, 26]
                });

                const muniMarker = L.marker(muni.coords, { icon: muniIcon, zIndexOffset: 1000 });
                muniMarker.bindTooltip(`<b>${muni.name}</b><br>${totalInst} Instituciones`, { direction: 'bottom', className: 'modern-tooltip' });
                
                muniMarker.on('click', () => {
                    openSidebar(muni.id);

                    const validCoords = muni.instituciones.filter(i => i.coords !== null).map(i => i.coords);
                    if (validCoords.length > 0) {
                        const bounds = L.latLngBounds(validCoords);
                        map.flyToBounds(bounds, { padding: [50, 50], maxZoom: 13 });
                    } else {
                        map.flyTo(muni.coords, 12);
                    }
                });

                muniMarker.addTo(muniLayerGroup);

                muni.instituciones.forEach((inst, index) => {
                    if (!inst.coords) return;

                    const instIcon = L.divIcon({
                        className: '',
                        html: `<div class="marker-wrapper"><div class="inst-bubble inst-for-${muni.id}" id="inst-bubble-${inst.id}" style="width:26px; height:26px; --delay: ${index * 0.03}s">IE</div></div>`,
                        iconSize: [26, 26],
                        iconAnchor: [13, 13]
                    });

                    const instMarker = L.marker(inst.coords, { icon: instIcon, zIndexOffset: 10 });
                    instMarker.bindTooltip(inst.name, { direction: 'top', className: 'modern-tooltip' });

                    instMarker.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        openSidebar(muni.id, inst.id);
                    });

                    instMarker.addTo(instLayerGroup);
                });
            });
        }

        // Control dinámico de visibilidad según nivel de Zoom
        function handleZoomEnd() {
            const currentZoom = map.getZoom();
            const muniBubbles = document.querySelectorAll('.muni-bubble');
            const instBubbles = document.querySelectorAll('.inst-bubble');

            if (currentZoom >= config.minZoomToDistricts) {
                muniBubbles.forEach(b => b.classList.add('hidden'));
                instBubbles.forEach(b => b.classList.add('visible'));
            } else {
                muniBubbles.forEach(b => b.classList.remove('hidden'));
                instBubbles.forEach(b => b.classList.remove('visible'));
            }
        }

        const sidebar = document.getElementById('sidebar');

        function openSidebar(muniId, highlightInstId = null) {
            const muniData = educacionData.find(m => m.id === muniId);
            if (!muniData) return;

            document.getElementById('side-title').innerText = muniData.name;
            document.getElementById('side-subtitle').innerText = `${muniData.instituciones.length} instituciones registradas`;

            const contentDiv = document.getElementById('side-content');
            contentDiv.innerHTML = '';

            const zones = [...new Set(muniData.instituciones.map(i => i.zone))];

            zones.forEach(zone => {
                const section = document.createElement('div');
                section.className = 'zone-section';
                
                const title = document.createElement('h3');
                title.className = 'zone-title';
                title.innerText = zone;
                section.appendChild(title);

                const ul = document.createElement('ul');
                ul.className = 'inst-list';

                const instsInZone = muniData.instituciones.filter(i => i.zone === zone);
                instsInZone.forEach(inst => {
                    const li = document.createElement('li');
                    const hasCoord = inst.coords !== null;
                    
                    li.className = `inst-item ${highlightInstId === inst.id ? 'highlight' : ''} ${!hasCoord ? 'no-coord' : ''}`;
                    li.id = `item-${inst.id}`;
                    
                    if (hasCoord) {
                        li.innerText = inst.name;
                        li.onclick = () => highlightMarker(inst);
                    } else {
                        li.innerHTML = `<span>${inst.name}</span><span class="tag-pending">Sin ubicación</span>`;
                    }
                    
                    ul.appendChild(li);
                });

                section.appendChild(ul);
                contentDiv.appendChild(section);
            });

            sidebar.classList.add('open');

            if (highlightInstId) {
                setTimeout(() => {
                    document.getElementById(`item-${highlightInstId}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            document.querySelectorAll('.inst-item').forEach(el => el.classList.remove('highlight'));
        }

        function highlightMarker(inst) {
            if (!inst.coords) return;

            document.querySelectorAll('.inst-item').forEach(el => el.classList.remove('highlight'));
            document.getElementById(`item-${inst.id}`)?.classList.add('highlight');
            
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                map.flyTo([inst.coords[0] - 0.005, inst.coords[1]], 15);
            } else {
                map.flyTo(inst.coords, 16);
            }
            
            const bubbleEl = document.getElementById(`inst-bubble-${inst.id}`);
            if (bubbleEl) {
                bubbleEl.style.backgroundColor = 'var(--accent-color)';
                bubbleEl.style.color = 'white';
                bubbleEl.style.transform = 'scale(1.4)';
                setTimeout(() => {
                    bubbleEl.style.backgroundColor = '';
                    bubbleEl.style.color = '';
                    bubbleEl.style.transform = '';
                }, 1200);
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('theme-text').innerText = isDark ? 'Modo Claro' : 'Modo Oscuro';
            
            if (isDark) {
                map.tileLayers.light.remove();
                map.tileLayers.dark.addTo(map);
            } else {
                map.tileLayers.dark.remove();
                map.tileLayers.light.addTo(map);
            }
            
            // Actualizamos la frontera de Colombia con el tema activo
            if (colombiaGeoJsonLayer) {
                colombiaGeoJsonLayer.setStyle(getColombiaStyle());
            }

            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            toggleTheme();
        }

        window.onload = init;
    </script>
</body>
</html>
