<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Mapa Educativo - Magdalena</title>
    
    <!-- Fuentes: Inter para un look moderno -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        :root {
            /* Variables Tema Claro (Por defecto) */
            --bg-color: #FAFAFA;
            --surface-color: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --accent-color: #0070F3; /* Azul Vercel/Stripe */
            --accent-hover: #0051B3;
            
            /* Burbujas */
            --muni-bubble-bg: var(--accent-color);
            --muni-bubble-color: #FFFFFF;
            --inst-bubble-bg: #FFFFFF;
            --inst-bubble-border: var(--accent-color);
            --inst-bubble-color: var(--accent-color);

            /* UI Elements */
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            
            --transition-speed: 0.3s;
        }

        /* Variables Tema Oscuro */
        body.dark-mode {
            --bg-color: #111111;
            --surface-color: #161616;
            --text-main: #EDEDED;
            --text-muted: #A0A0A0;
            --border-color: #333333;
            --accent-color: #3291FF; /* Azul más brillante para contraste */
            
            --muni-bubble-bg: var(--accent-color);
            --inst-bubble-bg: #161616;
            --inst-bubble-border: var(--accent-color);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color var(--transition-speed);
        }

        /* --- Header & Theme Toggle --- */
        header {
            background-color: var(--surface-color);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .header-titles h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.025em; }
        .header-titles .subtitle { color: var(--text-muted); font-size: 0.85rem; }

        .theme-toggle-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .theme-toggle-btn:hover { background-color: var(--bg-color); border-color: var(--text-muted); }
        .theme-toggle-btn svg { width: 16px; height: 16px; }
        body.dark-mode .sun-icon, body:not(.dark-mode) .moon-icon { display: none; }

        /* --- Main Layout --- */
        main { flex: 1; position: relative; overflow: hidden; display: flex; }

        /* --- Map --- */
        #map { flex: 1; width: 100%; height: 100%; z-index: 1; background-color: var(--bg-color); }

        /* --- Custom Markers (Burbujas) --- */
        .leaflet-div-icon { background: transparent; border: none; }

        /* Burbuja Municipio (Grande, Azul) */
        .muni-bubble {
            background-color: var(--muni-bubble-bg);
            color: var(--muni-bubble-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 0 0 4px rgba(50, 145, 255, 0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s;
            transform-origin: center;
        }
        .muni-bubble:hover { transform: scale(1.1); }
        .muni-bubble.hidden { opacity: 0; transform: scale(0); pointer-events: none; }

        /* Burbuja Institución (Pequeña, Blanca/Negra) */
        .inst-bubble {
            background-color: var(--inst-bubble-bg);
            color: var(--inst-bubble-color);
            border: 2px solid var(--inst-bubble-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.75rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease, opacity 0.3s ease var(--delay, 0s), transform 0.3s ease var(--delay, 0s);
            transform-origin: center;
            opacity: 0; transform: scale(0); /* Estado inicial oculto */
        }
        .inst-bubble.visible { opacity: 1; transform: scale(1); }
        .inst-bubble:hover { transform: scale(1.25) !important; z-index: 1000; background-color: var(--accent-color); color: white; }

        /* --- Sidebar Panel --- */
        #sidebar {
            position: absolute; top: 1rem; right: 1rem; bottom: 1rem; width: 360px;
            background-color: var(--surface-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background-color var(--transition-speed), border-color var(--transition-speed);
            display: flex; flex-direction: column; overflow: hidden;
        }
        #sidebar.open { transform: translateX(0); }

        .sidebar-header { padding: 1.25rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: flex-start; }
        .sidebar-title { font-size: 1.1rem; font-weight: 600; }
        .sidebar-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }

        .close-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.2rem; border-radius: 4px; }
        .close-btn:hover { background-color: var(--bg-color); color: var(--text-main); }

        .sidebar-content { padding: 1rem; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1rem; }

        .zone-section .zone-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; padding-left: 0.5rem;}

        .inst-list { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }
        .inst-item {
            font-size: 0.8rem; padding: 0.6rem 0.8rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .inst-item:hover { border-color: var(--accent-color); background-color: var(--surface-color); transform: translateX(-2px); }
        .inst-item.highlight { border-color: var(--accent-color); background-color: rgba(50, 145, 255, 0.12); font-weight: 600; }

        /* Tooltip moderno */
        .leaflet-tooltip.modern-tooltip {
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

    </style>
</head>
<body>

    <header>
        <div class="header-titles">
            <h1>Cobertura Territorial de Instituciones Educativas</h1>
            <div class="subtitle">Departamento del Magdalena</div>
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Cambiar tema">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <span id="theme-text">Modo Oscuro</span>
        </button>
    </header>

    <main>
        <div id="map"></div>
        
        <aside id="sidebar">
            <div class="sidebar-header">
                <div>
                    <h2 class="sidebar-title" id="side-title">Municipio</h2>
                    <div class="sidebar-subtitle" id="side-subtitle">0 instituciones</div>
                </div>
                <button class="close-btn" onclick="closeSidebar()" aria-label="Cerrar panel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="sidebar-content" id="side-content">
                <!-- Contenido dinámico -->
            </div>
        </aside>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script>
        /**
         * COORDENADAS REALES Y PRECISAS PARA LAS INSTITUCIONES EDUCATIVAS
         */
        const educacionData = [
            {
                id: "santa-marta",
                name: "Santa Marta",
                coords: [11.2404, -74.1978], // Centroide Urbano
                zoom: 11,
                instituciones: [
                    // ZONA URBANA
                    { id: "sm_ied_mag", name: "I.E.D. Magdalena", zone: "Urbana", coords: [11.2336, -74.2015] },
                    { id: "sm_ied_jmd", name: "IED Juan Miguel D'Osuna", zone: "Urbana", coords: [11.2472, -74.2075] },
                    { id: "sm_ied_on", name: "IED Once de Noviembre", zone: "Urbana", coords: [11.2285, -74.1532] },
                    { id: "sm_ied_jlg", name: "IED José Laborde Gnecco", zone: "Urbana", coords: [11.2492, -74.2115] },
                    { id: "sm_ied_sb", name: "I.E.D. Simón Bolívar", zone: "Urbana", coords: [11.2295, -74.1728] },
                    { id: "sm_ied_rdb", name: "IED Rodrigo de las Bastidas", zone: "Urbana", coords: [11.2458, -74.1685] },
                    { id: "sm_ied_ti", name: "IED Técnico Industrial", zone: "Urbana", coords: [11.2361, -74.2038] },
                    { id: "sm_ied_pc", name: "IED Pedagógico del Caribe", zone: "Urbana", coords: [11.2165, -74.1520] },
                    { id: "sm_ied_nb", name: "IED Nicolás Buenaventura", zone: "Urbana", coords: [11.2515, -74.1620] },
                    { id: "sm_ied_sr", name: "IED Simón Rodríguez", zone: "Urbana", coords: [11.2350, -74.1610] },
                    { id: "sm_ied_ln", name: "IED Liceo del Norte", zone: "Urbana", coords: [11.2428, -74.1982] },
                    { id: "sm_ied_ct", name: "I.E.D. Camilo Torres", zone: "Urbana", coords: [11.1932, -74.2235] },
                    { id: "sm_ied_lrm", name: "Institución Educativa Libardo Ramiro Muñoz", zone: "Urbana", coords: [11.2185, -74.2120] },
                    // ZONA RURAL
                    { id: "sm_ied_bon", name: "IED Bonda (Sede Inmaculada Concepción)", zone: "Rural", coords: [11.2405, -74.1065] },
                    { id: "sm_ied_rev", name: "Institución Etnoeducativa Distrital Intercultural La Revuelta", zone: "Rural", coords: [11.2825, -73.9105] }
                ]
            },
            {
                id: "aracataca",
                name: "Aracataca",
                coords: [10.5928, -74.1892], // Centro de Aracataca
                zoom: 14,
                instituciones: [
                    { id: "ara_ied_evt", name: "IED Elvia Vizcaíno de Todaro", zone: "Urbana", coords: [10.5928, -74.1892] }
                ]
            }
        ];

        // Configuración Global
        const config = {
            mapCenter: [10.90, -74.15],
            initZoom: 9,
            minZoomToDistricts: 11
        };

        let map, muniLayerGroup, instLayerGroup;

        function init() {
            initMap();
            plotData();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(config.mapCenter, config.initZoom);
            
            const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' });
            const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' });
            
            lightTiles.addTo(map);
            map.tileLayers = { light: lightTiles, dark: darkTiles };

            L.control.zoom({ position: 'bottomright' }).addTo(map);

            muniLayerGroup = L.layerGroup().addTo(map);
            instLayerGroup = L.layerGroup().addTo(map);

            map.on('zoomend', handleZoomEnd);
        }

        function plotData() {
            educacionData.forEach(muni => {
                const totalInst = muni.instituciones.length;

                // 1. Marcador Municipio (Burbuja Principal)
                const muniIcon = L.divIcon({
                    className: '',
                    html: `<div class="muni-bubble" id="muni-bubble-${muni.id}" style="width:48px; height:48px;">${totalInst}</div>`,
                    iconSize: [48, 48],
                    iconAnchor: [24, 24]
                });

                const muniMarker = L.marker(muni.coords, { icon: muniIcon });
                muniMarker.bindTooltip(`<b>${muni.name}</b><br>${totalInst} Instituciones`, { direction: 'bottom', className: 'modern-tooltip' });
                
                muniMarker.on('click', () => {
                    map.flyTo(muni.coords, muni.zoom);
                    openSidebar(muni.id);
                });

                muniMarker.addTo(muniLayerGroup);

                // 2. Marcadores para Colegios Individuales
                muni.instituciones.forEach((inst, index) => {
                    const instIcon = L.divIcon({
                        className: '',
                        html: `<div class="inst-bubble inst-for-${muni.id}" id="inst-bubble-${inst.id}" style="width:24px; height:24px; --delay: ${index * 0.04}s">IE</div>`,
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });

                    const instMarker = L.marker(inst.coords, { icon: instIcon });
                    instMarker.bindTooltip(inst.name, { direction: 'top', className: 'modern-tooltip' });

                    instMarker.on('click', () => {
                        openSidebar(muni.id, inst.id);
                    });

                    instMarker.addTo(instLayerGroup);
                });
            });
        }

        function handleZoomEnd() {
            const currentZoom = map.getZoom();
            const muniBubbles = document.querySelectorAll('.muni-bubble');
            const instBubbles = document.querySelectorAll('.inst-bubble');

            if (currentZoom >= config.minZoomToDistricts) {
                muniBubbles.forEach(b => b.classList.add('hidden'));
                instBubbles.forEach(b => b.classList.add('visible'));
            } else {
                muniBubbles.forEach(b => b.classList.remove('hidden'));
                instBubbles.forEach(b => b.classList.remove('visible'));
                if (sidebar.classList.contains('open')) closeSidebar(false);
            }
        }

        const sidebar = document.getElementById('sidebar');

        function openSidebar(muniId, highlightInstId = null) {
            const muniData = educacionData.find(m => m.id === muniId);
            if (!muniData) return;

            document.getElementById('side-title').innerText = muniData.name;
            document.getElementById('side-subtitle').innerText = `${muniData.instituciones.length} instituciones registradas`;

            const contentDiv = document.getElementById('side-content');
            contentDiv.innerHTML = '';

            const zones = [...new Set(muniData.instituciones.map(i => i.zone))];

            zones.forEach(zone => {
                const section = document.createElement('div');
                section.className = 'zone-section';
                
                const title = document.createElement('h3');
                title.className = 'zone-title';
                title.innerText = zone;
                section.appendChild(title);

                const ul = document.createElement('ul');
                ul.className = 'inst-list';

                const instsInZone = muniData.instituciones.filter(i => i.zone === zone);
                instsInZone.forEach(inst => {
                    const li = document.createElement('li');
                    li.className = `inst-item ${highlightInstId === inst.id ? 'highlight' : ''}`;
                    li.id = `item-${inst.id}`;
                    li.innerText = inst.name;
                    
                    li.onclick = () => highlightMarker(inst);
                    
                    ul.appendChild(li);
                });

                section.appendChild(ul);
                contentDiv.appendChild(section);
            });

            sidebar.classList.add('open');

            if (highlightInstId) {
                setTimeout(() => {
                    document.getElementById(`item-${highlightInstId}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }
        }

        function closeSidebar(flyBack = true) {
            sidebar.classList.remove('open');
            document.querySelectorAll('.inst-item').forEach(el => el.classList.remove('highlight'));
            
            if (flyBack) {
                map.flyTo(config.mapCenter, config.initZoom);
            }
        }

        function highlightMarker(inst) {
            document.querySelectorAll('.inst-item').forEach(el => el.classList.remove('highlight'));
            document.getElementById(`item-${inst.id}`)?.classList.add('highlight');
            
            map.flyTo(inst.coords, 15);
            
            const bubbleEl = document.getElementById(`inst-bubble-${inst.id}`);
            if (bubbleEl) {
                bubbleEl.style.backgroundColor = 'var(--accent-color)';
                bubbleEl.style.color = 'white';
                bubbleEl.style.transform = 'scale(1.4)';
                setTimeout(() => {
                    bubbleEl.style.backgroundColor = '';
                    bubbleEl.style.color = '';
                    bubbleEl.style.transform = '';
                }, 1200);
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('theme-text').innerText = isDark ? 'Modo Claro' : 'Modo Oscuro';
            
            if (isDark) {
                map.tileLayers.light.remove();
                map.tileLayers.dark.addTo(map);
            } else {
                map.tileLayers.dark.remove();
                map.tileLayers.light.addTo(map);
            }
            
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            toggleTheme();
        }

        window.onload = init;
    </script>
</body>
</html>
